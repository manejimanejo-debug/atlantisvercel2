*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000;

}

img{
max-width:100%;
display:block;
}

a{
text-decoration:none;
}

.bg-glow{
position:fixed;
inset:0;
background:
radial-gradient(circle at top, rgba(255,140,0,.12), transparent 35%),
radial-gradient(circle at bottom, rgba(255,120,0,.06), transparent 45%);

z-index:0;
}

.main{

50%{transform:translateY(-5px);}

}

}

.offer-card{
width:100%;

background:

border:1px solid rgba(0,120,255,.22);

overflow:hidden;
box-shadow:
0 0 30px rgba(0,120,255,.15),

.offer-top{

.offer-title{

}

.offer-title span{
color:#ffb100;
}

.offer-subtitle{
color:#9fb4d4;
font-size:14px;
font-weight:500;
}

.divider{
height:1px;
width:100%;
background:rgba(255,255,255,.04);
}

.button-wrap{
padding:24px 24px 12px;
}

.whatsapp-btn{
width:100%;
min-height:92px;
border-radius:30px;
background:linear-gradient(180deg,#ffbf00 0%, #ffae00 100%);
display:flex;
align-items:center;
justify-content:center;
gap:20px;
color:white;
font-weight:900;
font-size:20px;
text-transform:uppercase;
position:relative;
overflow:hidden;
box-shadow:
0 0 35px rgba(255,196,0,.45),
0 0 80px rgba(255,196,0,.15),
inset 0 2px 0 rgba(255,255,255,.35);
animation:pulse 1.8s infinite;
}

.whatsapp-btn::before{
content:'';
position:absolute;
inset:0;
background:
linear-gradient(
120deg,
transparent 20%,
rgba(255,255,255,.22) 50%,
transparent 80%
);
transform:translateX(-100%);
animation:shine 3s infinite;
}

@keyframes shine{
0%{
transform:translateX(-120%);
}
100%{
transform:translateX(120%);
}
}

@keyframes pulse{
0%{
transform:scale(1);
box-shadow:
0 0 0 0 rgba(255,196,0,.65),
0 0 35px rgba(255,196,0,.42);
}

70%{
transform:scale(1.02);
box-shadow:
0 0 0 18px rgba(255,196,0,0),
0 0 55px rgba(255,196,0,.6);
}

100%{
transform:scale(1);
box-shadow:
0 0 0 0 rgba(255,196,0,0),
0 0 35px rgba(255,196,0,.42);
}
}

.wa-icon{
width:58px;
height:58px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
position:relative;
z-index:2;

.info-boxes{

margin-top:16px;

}

.info{

border:1px solid rgba(0,140,255,.18);

padding:14px 10px;
text-align:center;

.info small{
display:block;
color:#8cb5ff;
font-size:11px;

}

.info strong{

font-size:22px;

}

.footer-text{

.games{
width:100%;
max-width:960px;

width:100%;

@media(max-width:768px){

gap:8px;

.info strong{
font-size:18px;
}

<script>

const whatsappNumbers = [
"5491126328537"
];

// ROTA CADA 5 MINUTOS
const rotationTime = 5 * 60 * 1000;

const savedData =
JSON.parse(localStorage.getItem("wa_rotation")) || {
index: 0,
timestamp: Date.now()
};

let currentIndex = savedData.index;
let lastRotation = savedData.timestamp;

// SI PASARON 5 MINUTOS → CAMBIA
if(Date.now() - lastRotation >= rotationTime){

currentIndex =
(currentIndex + 1) %
whatsappNumbers.length;

lastRotation = Date.now();

localStorage.setItem(
"wa_rotation",
JSON.stringify({
index: currentIndex,
timestamp: lastRotation
})
);

}

const button =
document.getElementById("whatsapp-button");

// BLOQUEO DOBLE CLICK
let processing = false;

button.addEventListener("click", function(e){

e.preventDefault();

if(processing) return;

processing = true;

const currentNumber =
whatsappNumbers[currentIndex];

const message = encodeURIComponent(
"Hola 👋 quiero reclamar mi bono del 100% 🎰"
);

// LEAD
fbq(
'track',
'Lead',
{},
{
eventID: 'lead_' + Date.now()
}
);

// PURCHASE
fbq(
'track',
'Purchase',
{
value: 1,
currency: 'USD'
},
{
eventID: 'purchase_' + Date.now()
}
);

// ABRIR WHATSAPP
setTimeout(() => {

const dynamicUrl =
`https://wa.me/${currentNumber}?text=${message}`;

window.open(dynamicUrl, "_blank");

setTimeout(() => {
processing = false;
}, 1500);

}, 500);

});

</script>
